<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    header {
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f8f8f8;
      padding: 0px 20px;
      box-shadow:  2px 2px 5px rgba(0, 0, 0, 0.1);
    }
    .logobox {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: black;
    }
    .logobox img {
      width: 50px;
      height: 50px;
      margin-right: 5px;
    }
    .logobox span {
      font-size: 24px;
      font-weight: 550;
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
    nav ul {
      list-style-type: none;
      display: flex;
      gap: 20px;
    }
    nav ul li {
      display: inline;
      font-size: 22px;
    }
    nav ul li a {
      text-decoration: none;
      color: #000000;
    }
    nav ul li a:hover {
      color: #0000ff;
      text-decoration: underline;
      text-shadow: 2px 2px 2px rgba(0, 0, 0, 0.2);
    }

  </style>
</head>
<body>
  <header>
    <a href="#" class="logobox">
      <img src="" alt="">
      <span>My Website</span>
    </a>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>
</body>
</html>
