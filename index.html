<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home | CodeVerse</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .cover-image {
      margin-top: 80px;
      width: 100%;
      height: auto;
      display: block;
    }
    .page-box {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
      border: 2px solid #ccc;
      border-radius: 20px;
      padding: 20px;
      margin: 20px;
    }
    .pages {
      width: 332px;
      height: 196px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease-in-out;
    }
    .pages img {
      width: 100%;
      height: 100%;
      border-radius: 10px;
    }
    .pages:hover {
      transform: translateY(-10px);
    }
  </style>
</head>
<body>
  <div id="header-container"></div>
  <script src="js/header.js"></script>
  <img src="/images/cover.jpg" alt="coverimage" class="cover-image">
  <div class="page-box">
    <div class="pages">
      <a href="/pages/HTML.html">
        <img src="/images/html.jpg" alt="Html-page">
      </a>
    </div>
    <div class="pages">
      <a href="/pages/CSS.html">
        <img src="/images/css.jpg" alt="Css-page">
      </a>
    </div>
    <div class="pages">
      <a href="/pages/JavaScript.html">
        <img src="/images/javascript.jpg" alt="JavaScript-page">
      </a>
    </div>
    <div class="pages">
      <a href="/pages/PHP.html">
        <img src="/images/php.jpg" alt="PHP-page">
      </a>
    </div>
    <div class="pages">
      <a href="/pages/Python.html">
        <img src="/images/python.jpg" alt="Python-page">
      </a>
    </div>
    <div class="pages">
      <a href="/pages/Java.html">
        <img src="/images/java.jpg" alt="Java-page">
      </a>
    </div>
  </div>
</body>
</html>
